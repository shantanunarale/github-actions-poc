jobs:
  lint_job:
    runs-on: ubuntu-latest
    steps:
      - name: test_code
        uses: actions/checkout@v3
      - name: run_lint
        uses: echo "Linter Run"
  test_job:
    runs-on: ubuntu-latest
    needs: lint_job
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: run_test
        run: echo "RUnning Tests"
  deploy_job:
