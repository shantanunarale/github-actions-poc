name: Test-GHActions
on: workflow_dispatch
jobs:

  lint_job:
    runs-on: ubuntu-latest
    steps:
      - name: test_code
        uses: actions/checkout@v3
      - name: run_lint
        run: echo "Linter Run"

  test_job:
    runs-on: ubuntu-latest
    needs: lint_job
    steps:
      - name: code_checkout
        uses: actions/checkout@v6.0.2
      - name: run_tests
        run: echo "Run Test"

  deploy_job:
    runs-on: ubuntu-latest
    needs: test_job
    steps:
      - name: code_checkout
        uses: actions/checkout@v6.0.2
      - name: run_depl
        run: echo "Deploying..."
